{% extends "base.html" %}
{% block title %}Nouvelle entrée de stock{% endblock %}
{% block content %}
<h2 class="mb-3"><i class="bi bi-arrow-down-circle"></i> Nouvelle entrée de stock</h2>

<div class="card shadow-sm">
  <div class="card-body">
    <form method="post">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Fournisseur *</label>
          <select name="supplier_id" class="form-select" required>
            <option value="">— Choisir —</option>
            {% for s in suppliers %}
              <option value="{{ s.id }}">{{ s.name }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label">Produit *</label>
          <select name="product_id" class="form-select" required>
            <option value="">— Choisir —</option>
            {% for p in products %}
              <option value="{{ p.id }}">{{ p.name }} (stock actuel : {{ p.quantity }})</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label">Quantité *</label>
          <input type="number" min="1" name="quantity" class="form-control" required>
        </div>
        <div class="col-md-4">
          <label class="form-label">Prix unitaire d'achat</label>
          <input type="number" step="0.01" min="0" name="unit_price" class="form-control" value="0">
        </div>
        <div class="col-md-4">
          <label class="form-label">Note</label>
          <input type="text" name="note" class="form-control" placeholder="Référence, BL, etc.">
        </div>
      </div>
      <div class="mt-3">
        <button class="btn btn-primary"><i class="bi bi-save"></i> Enregistrer</button>
        <a href="{{ url_for('stock_in.list_view') }}" class="btn btn-secondary">Annuler</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
