{% extends "base.html" %}
{% block title %}{{ "Modifier" if item else "Nouveau" }} produit{% endblock %}
{% block content %}
<h2 class="mb-3"><i class="bi bi-box"></i> {{ "Modifier" if item else "Nouveau" }} produit</h2>

{% set d = form or item %}

<div class="card shadow-sm">
  <div class="card-body">
    <form method="post">
      <div class="row g-3">
        <div class="col-md-8">
          <label class="form-label">Nom *</label>
          <input type="text" name="name" class="form-control" value="{{ d.name if d else '' }}" required>
        </div>
        <div class="col-md-4">
          <label class="form-label">SKU</label>
          <input type="text" name="sku" class="form-control" value="{{ d.sku if d else '' }}">
        </div>
        <div class="col-md-6">
          <label class="form-label">Catégorie *</label>
          <select name="category_id" class="form-select" required>
            <option value="">— Choisir —</option>
            {% for c in categories %}
              <option value="{{ c.id }}" {% if d and d.category_id == c.id %}selected{% endif %}>{{ c.name }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-2">
          <label class="form-label">Prix *</label>
          <input type="number" step="0.01" min="0" name="price" class="form-control" value="{{ d.price if d else 0 }}" required>
        </div>
        <div class="col-md-2">
          <label class="form-label">Quantité *</label>
          <input type="number" min="0" name="quantity" class="form-control" value="{{ d.quantity if d else 0 }}" required>
        </div>
        <div class="col-md-2">
          <label class="form-label">Stock min *</label>
          <input type="number" min="0" name="min_stock" class="form-control" value="{{ d.min_stock if d else 0 }}" required>
        </div>
      </div>
      <div class="mt-3">
        <button class="btn btn-primary"><i class="bi bi-save"></i> Enregistrer</button>
        <a href="{{ url_for('products.list_view') }}" class="btn btn-secondary">Annuler</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
